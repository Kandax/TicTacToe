<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Tic Tac Toe Theme Preview</title>

<style>
:root {
    /* Backgrounds */
    --bg-main: #121417;
    --bg-panel: #1B1F24;
    --bg-tile: #252B33;
    --bg-hover: #313844;

    /* Borders */
    --border: #3B4452;

    /* Text */
    --text-main: #F5F7FA;
    --text-secondary: #A7B0BE;

    /* Players */
    --player-x: #4CC9F0;
    --player-o: #C77DFF;

    /* States */
    --success: #80ED99;
    --danger: #FF6B6B;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: var(--bg-main);
    color: var(--text-main);
    font-family: Arial, sans-serif;

    display: flex;
    justify-content: center;
    align-items: center;

    min-height: 100vh;
}

.container {
    width: 420px;

    background: var(--bg-panel);

    border: 1px solid var(--border);
    border-radius: 18px;

    padding: 32px;

    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.title {
    text-align: center;
    font-size: 32px;
    margin-bottom: 12px;
}

.subtitle {
    text-align: center;
    color: var(--text-secondary);
    margin-bottom: 32px;
}

.menu {
    display: flex;
    flex-direction: column;
    gap: 14px;

    margin-bottom: 36px;
}

.button {
    background: var(--bg-tile);

    color: var(--text-main);

    border: 1px solid var(--border);
    border-radius: 12px;

    padding: 14px;

    font-size: 16px;

    cursor: pointer;

    transition:
        background 0.2s ease,
        transform 0.15s ease;
}

.button:hover {
    background: var(--bg-hover);
    transform: translateY(-2px);
}

.button.exit {
    color: var(--danger);
}

.board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);

    gap: 10px;
}

.tile {
    aspect-ratio: 1;

    background: var(--bg-tile);

    border: 1px solid var(--border);
    border-radius: 12px;

    display: flex;
    justify-content: center;
    align-items: center;

    font-size: 42px;
    font-weight: bold;

    transition: 0.2s;
}

.tile:hover {
    background: var(--bg-hover);
}

.x {
    color: var(--player-x);
}

.o {
    color: var(--player-o);
}

.footer {
    margin-top: 28px;

    text-align: center;
    color: var(--success);

    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

    <h1 class="title">Tic Tac Toe</h1>

    <p class="subtitle">
        Dark Minimal Theme
    </p>

    <div class="menu">
        <button class="button">Play vs AI</button>
        <button class="button">Play vs Player</button>
        <button class="button exit">Exit Game</button>
    </div>

    <div class="board">
        <div class="tile x">X</div>
        <div class="tile o">O</div>
        <div class="tile"></div>

        <div class="tile"></div>
        <div class="tile x">X</div>
        <div class="tile"></div>

        <div class="tile o">O</div>
        <div class="tile"></div>
        <div class="tile x">X</div>
    </div>

    <div class="footer">
        Player X wins!
    </div>

</div>

</body>
</html>
